<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Snapkick — Poomsae Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #111; color: #eee; padding: 24px;
  }
  h1 { text-align: center; font-size: 28px; font-weight: 600; margin-bottom: 8px; color: #D45520; }
  .subtitle { text-align: center; color: #888; margin-bottom: 40px; font-size: 14px; }
  .loading { text-align: center; color: #888; margin-top: 80px; font-size: 16px; }

  /* Group section */
  .group-section { margin-bottom: 48px; }
  .group-header {
    font-size: 18px; font-weight: 700; color: #D45520;
    margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #D45520;
  }

  /* Take within a group */
  .take { margin-bottom: 32px; }
  .take-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .take-label { font-size: 16px; font-weight: 600; color: #ccc; }
  .take-time { font-size: 13px; color: #666; font-family: monospace; }
  .take-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; max-width: 1000px; }
  @media (max-width: 600px) { .take-grid { grid-template-columns: minmax(0, 1fr); } }
  .video-card { background: #1a1a1a; border-radius: 8px; overflow: hidden; min-width: 0; }
  .video-card iframe { width: 100%; aspect-ratio: 1/1; border: none; display: block; }
  .video-info { padding: 10px 12px; }
  .video-direction { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .video-filename { font-size: 12px; color: #999; font-family: monospace; }
  .video-time { font-size: 11px; color: #666; font-family: monospace; }
  .missing {
    background: #1a1a1a; border-radius: 8px; aspect-ratio: 1/1;
    display: flex; align-items: center; justify-content: center; color: #444; font-size: 14px;
  }

</style>
</head>
<body>
<h1>Snapkick &mdash; Poomsae Review</h1>
<p class="subtitle" id="subtitle"></p>
<div id="content"><p class="loading">Loading video data...</p></div>

<script>
const LIBRARY_ID = '621173';
const MATCH_WINDOW = 3; // seconds — how close timestamps must be to count as same take
const DIRECTIONS = ['North', 'South', 'East', 'West'];

// Poomsae labels keyed by the formatted group header (output of formatGroupDate).
// The insertion order here is also the display order on the page — re-shoots are
// placed immediately after the original takes of the same poomsae.
const POOMSAE_MAP = {
  'March 9, 2026 at 10:32 AM':  'Koryo - Take 1',
  'March 9, 2026 at 10:49 AM':  'Pyongwon - Take 1',
  'March 9, 2026 at 10:57 AM':  'Pyongwon - Take 2',
  'March 9, 2026 at 11:09 AM':  'Sa Jang - Take 1',
  'March 9, 2026 at 11:18 AM':  'Sa Jang - Take 2',
  'March 10, 2026 at 11:04 AM': 'Sa Jang - Re-Shoot - Take 1',
  'March 9, 2026 at 11:30 AM':  'Jitae - Take 1',
  'March 9, 2026 at 11:41 AM':  'Jitae - Take 2',
  'March 10, 2026 at 12:51 PM': 'Jitae - Re-Shoot - Take 1',
  'March 10, 2026 at 01:01 PM': 'Jitae - Re-Shoot - Take 2',
  'March 9, 2026 at 01:32 PM':  'Ilyeo - Take 1',
  'March 9, 2026 at 01:41 PM':  'Oh Jang - Take 1',
  'March 9, 2026 at 01:46 PM':  'Oh Jang - Take 2',
  'March 9, 2026 at 01:56 PM':  'Yuk Jang - Take 1',
  'March 9, 2026 at 02:08 PM':  'Sipjin - Take 1',
  'March 9, 2026 at 02:14 PM':  'Chil Jang - Take 1',
  'March 9, 2026 at 02:18 PM':  'Chil Jang - Take 2',
  'March 10, 2026 at 08:47 AM': 'Hansu - Take 1',
  'March 10, 2026 at 08:59 AM': 'Chonkwon - Take 1',
  'March 10, 2026 at 09:11 AM': 'Chonkwon - Take 2',
  'March 10, 2026 at 09:23 AM': 'Taebaek - Take 1',
  'March 10, 2026 at 09:31 AM': 'Taebaek - Take 2',
  'March 10, 2026 at 09:47 AM': 'Pal Jang - Take 1',
  'March 10, 2026 at 10:02 AM': 'Keumgang - Take 1',
  'March 10, 2026 at 10:10 AM': 'Sam Jang - Take 1',
  'March 10, 2026 at 10:18 AM': 'Il Jang - Take 1',
  'March 10, 2026 at 10:49 AM': 'E Jang - Take 1',
};
const DISPLAY_ORDER = Object.keys(POOMSAE_MAP);

function formatGroupDate(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleString('en-US', {
    month: 'long', day: 'numeric', year: 'numeric',
    hour: '2-digit', minute: '2-digit', hour12: true,
    timeZone: 'UTC'
  });
}

function groupHeader(ts) {
  const dateStr = formatGroupDate(ts);
  const poomsae = POOMSAE_MAP[dateStr];
  return poomsae ? `${dateStr} — ${poomsae}` : dateStr;
}


fetch('review-data.json?v=' + Date.now())
  .then(r => r.json())
  .then(videos => {
    // Filter to only N/S/E/W
    videos = videos.filter(v => DIRECTIONS.includes(v.direction));
    if (!videos.length) {
      document.getElementById('content').innerHTML =
        '<p class="loading">No video data yet.</p>';
      return;
    }

    // Deduplicate by video_id
    const seenIds = new Set();
    const dupeCount = videos.length;
    videos = videos.filter(v => {
      if (seenIds.has(v.video_id)) return false;
      seenIds.add(v.video_id);
      return true;
    });

    // Deduplicate by title+direction
    const seenTitleDir = new Set();
    videos = videos.filter(v => {
      const key = `${v.title}|${v.direction}`;
      if (seenTitleDir.has(key)) return false;
      seenTitleDir.add(key);
      return true;
    });
    const dupesRemoved = dupeCount - videos.length;

    // Sort by timestamp
    videos.sort((a, b) => a.ts - b.ts);

    // Group into takes by matching timestamps within MATCH_WINDOW
    const used = new Set();
    const takes = [];

    for (let i = 0; i < videos.length; i++) {
      if (used.has(i)) continue;
      const take = {};
      take[videos[i].direction] = videos[i];
      used.add(i);

      for (let j = i + 1; j < videos.length; j++) {
        if (used.has(j)) continue;
        if (Math.abs(videos[j].ts - videos[i].ts) <= MATCH_WINDOW
            && !(videos[j].direction in take)) {
          take[videos[j].direction] = videos[j];
          used.add(j);
        }
      }
      takes.push(take);
    }

    // Sort takes by DISPLAY_ORDER (groups re-shoots with their poomsae).
    // Groups whose header isn't in DISPLAY_ORDER fall through to the end,
    // sorted by their earliest timestamp.
    takes.sort((a, b) => {
      const tsA = Math.min(...Object.values(a).map(v => v.ts));
      const tsB = Math.min(...Object.values(b).map(v => v.ts));
      const idxA = DISPLAY_ORDER.indexOf(formatGroupDate(tsA));
      const idxB = DISPLAY_ORDER.indexOf(formatGroupDate(tsB));
      if (idxA === -1 && idxB === -1) return tsA - tsB;
      if (idxA === -1) return 1;
      if (idxB === -1) return -1;
      return idxA - idxB;
    });

    // Update subtitle
    const dupeNote = dupesRemoved > 0 ? ` · ${dupesRemoved} duplicates removed` : '';
    document.getElementById('subtitle').textContent =
      `${takes.length} groups · ${videos.length} videos${dupeNote}`;

    // Render takes
    let html = '';
    takes.forEach((take, idx) => {
      const earliest = Math.min(...Object.values(take).map(v => v.ts));
      const timeStr = new Date(earliest * 1000).toISOString().replace('T', ' ').replace(/\.\d+Z/, ' UTC');

      html += `<div class="group-section" id="take-${idx}">
        <div class="group-header">${groupHeader(earliest)}</div>
        <div class="take">
          <div class="take-grid">`;

      DIRECTIONS.forEach(dir => {
        if (take[dir]) {
          const v = take[dir];
          const embedUrl = `https://iframe.mediadelivery.net/embed/${LIBRARY_ID}/${v.video_id}?autoplay=false&preload=false`;
          html += `<div class="video-card">
            <iframe src="${embedUrl}" loading="lazy"
                    allow="accelerometer; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen></iframe>
            <div class="video-info">
              <div class="video-direction">${dir}</div>
              <div class="video-filename">${v.title}.mp4</div>
              <div class="video-time">${v.created || ''}</div>
            </div>
          </div>`;
        } else {
          html += `<div class="missing">${dir} &mdash; not found</div>`;
        }
      });

      html += '</div></div></div>';
    });

    document.getElementById('content').innerHTML = html;
  })
  .catch(err => {
    document.getElementById('content').innerHTML =
      `<p class="loading">Error loading data: ${err.message}</p>`;
  });
</script>
</body>
</html>
